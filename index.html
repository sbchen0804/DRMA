<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 核心安全機制：阻擋所有搜尋引擎索引與追蹤，防止被公開搜尋 -->
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    
    <title>馬博士筋骨整復 × 湧健康 | 內部文件閱讀器 (v1.4)</title>
    
    <!-- 預先宣告全域 Tailwind 設定，確保樣式流暢 -->
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                50: '#f0fdf4',
                                100: '#dcfce7',
                                800: '#166534',
                                900: '#14532d',
                            },
                            amberAccent: {
                                500: '#f59e0b',
                                600: '#d97706',
                                700: '#b45309',
                            }
                        }
                    }
                }
            }
        };
    </script>

    <!-- 載入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts - Noto Sans TC 提供頂級的文字渲染 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
        }
        .blur-bg {
            backdrop-filter: blur(8px);
        }

        /* 核心防斷機制：直接用原生 CSS 寫死顏色，預防任何 CDN 延遲導致的跑版 */
        .bg-brand-900 {
            background-color: #14532d !important;
        }
        .bg-brand-800 {
            background-color: #166534 !important;
        }
        .text-brand-900 {
            color: #14532d !important;
        }
        .text-brand-800 {
            color: #166534 !important;
        }
        .bg-brand-50 {
            background-color: #f0fdf4 !important;
        }
        .border-brand-800 {
            border-color: #166534 !important;
        }
        .border-brand-900 {
            border-color: #14532d !important;
        }
        .text-emerald-100 {
            color: #dcfce7 !important;
        }
        .bg-amberAccent-500 {
            background-color: #f59e0b !important;
        }
        .text-amberAccent-500 {
            color: #f59e0b !important;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col relative">

    <!-- 1. 密碼保護遮罩 (0720 阿拉伯數字密碼鎖) -->
    <div id="password-overlay" class="fixed inset-0 z-50 bg-brand-900 flex flex-col justify-center items-center px-4 transition-all duration-500">
        <div class="absolute inset-0 opacity-10 bg-cover bg-center bg-no-repeat" style="background-image: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1200&q=80');"></div>
        <div class="bg-white/95 p-8 rounded-2xl shadow-2xl max-w-md w-full text-center relative z-10 border border-emerald-100 blur-bg">
            
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-brand-50 rounded-full flex items-center justify-center border-2 border-brand-800">
                    <svg class="w-8 h-8 text-brand-800" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
            </div>

            <h1 class="text-2xl font-bold text-gray-900 mb-2">內部文件閱讀專區 <span class="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full font-mono">v1.4</span></h1>
            <p class="text-sm text-gray-600 mb-6">
                本網頁為「馬博士筋骨整復 × 湧健康」高雄合作專案之內部交流與資料庫。請輸入授權閱讀密碼。
            </p>

            <!-- 密碼輸入表單 -->
            <div class="mb-6">
                <input type="password" id="pin-input" placeholder="請輸入 4 位數密碼" 
                       class="w-full text-center py-3 text-2xl font-semibold tracking-widest text-gray-800 bg-gray-100 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-800 focus:outline-none transition-all duration-300"
                       maxlength="6" onkeydown="if(event.key==='Enter') verifyPassword()">
                <p id="error-message" class="text-red-600 text-sm mt-3 hidden flex items-center justify-center gap-1">
                    <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    密碼錯誤，請重新輸入！
                </p>
            </div>

            <!-- 解鎖按鈕 -->
            <button onclick="verifyPassword()" class="w-full py-3 bg-brand-800 hover:bg-brand-900 text-white font-bold rounded-lg shadow-md transition-all duration-300 transform active:scale-95 focus:outline-none">
                解鎖並進入網頁
            </button>

            <!-- 提示資訊 -->
            <div class="mt-6 pt-4 border-t border-gray-200">
                <p class="text-xs text-gray-500 flex items-center justify-center gap-1">
                    <svg class="w-4 h-4 text-emerald-700" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M2.166 4.9L10 1.154l7.834 3.746A1 1 0 0118.5 5.79v4.23a10.022 10.022 0 01-4.82 8.528l-3.23 1.895a1 1 0 01-1.02 0l-3.23-1.895a10.022 10.022 0 01-4.82-8.528V5.79a1 1 0 01.554-.89zM10 3.167L4.5 5.8v3.42a8.018 8.018 0 003.856 6.822L10 17.15l1.644-.958A8.018 8.018 0 0015.5 9.22V5.8L10 3.167z" clip-rule="evenodd"></path></svg>
                    本網頁已啟用防搜尋爬蟲機制 (No-Index)
                </p>
            </div>
        </div>
    </div>

    <!-- 2. 主網頁結構 (解鎖後顯示) -->
    <div id="main-content" class="hidden flex-1 flex flex-col">
        
        <!-- 頂部頁首 (Header) -->
        <header class="bg-brand-900 text-white shadow-md relative overflow-hidden">
            <div class="absolute inset-0 bg-cover bg-center opacity-10" style="background-image: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1200&q=80');"></div>
            <div class="max-w-6xl mx-auto px-4 py-6 sm:px-6 relative z-10">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                    <div>
                        <div class="flex items-center gap-3 mb-1.5 flex-wrap">
                            <span class="bg-amberAccent-500 text-brand-900 text-xs font-bold px-3 py-0.5 rounded-full uppercase tracking-wider">內部專用文件閱讀庫 v1.4</span>
                            <span class="bg-white/10 text-white text-xs px-2.5 py-0.5 rounded-full flex items-center gap-1">
                                <svg class="w-3.5 h-3.5 text-emerald-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M2.166 4.9L10 1.154l7.834 3.746A1 1 0 0118.5 5.79v4.23a10.022 10.022 0 01-4.82 8.528l-3.23 1.895a1 1 0 01-1.02 0l-3.23-1.895a10.022 10.022 0 01-4.82-8.528V5.79a1 1 0 01.554-.89zM10 3.167L4.5 5.8v3.42a8.018 8.018 0 003.856 6.822L10 17.15l1.644-.958A8.018 8.018 0 0015.5 9.22V5.8L10 3.167z" clip-rule="evenodd"></path></svg>
                                密碼保護
                            </span>
                        </div>
                        <h1 class="text-2xl sm:text-3xl font-black tracking-tight text-white">
                            馬博士筋骨整復 × 湧健康 合作檔案
                        </h1>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="lockPage()" class="px-3.5 py-1.5 border border-white/20 hover:bg-white/10 rounded-lg text-xs font-semibold transition-all duration-300 flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            安全上鎖
                        </button>
                    </div>
                </div>
            </div>

            <!-- 主導覽選單 (Tabs Selector) -->
            <div class="bg-brand-800 border-t border-emerald-700/50">
                <div class="max-w-6xl mx-auto px-4">
                    <nav class="flex flex-wrap -mb-px justify-start gap-1 py-1.5" aria-label="Tabs">
                        <button onclick="switchTab(1)" id="btn-tab-1" class="px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 bg-white text-brand-900 shadow-sm flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-emerald-600"></span>
                            1. 高雄合作會談手冊
                        </button>
                        <button onclick="switchTab(2)" id="btn-tab-2" class="px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 text-emerald-100 hover:text-white hover:bg-brand-900/40 flex items-center gap-2">
                            2. 雙方合作與商品說明文件
                        </button>
                        <button onclick="switchTab(3)" id="btn-tab-3" class="px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 text-emerald-100 hover:text-white hover:bg-brand-900/40 flex items-center gap-2">
                            3. 蔡中醫博士健康觀點
                        </button>
                    </nav>
                </div>
            </div>
        </header>

        <!-- 主文件閱讀工作區 -->
        <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-6 sm:px-6">
            
            <!-- PDF 線上嵌入閱讀窗 -->
            <div class="bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden h-[76vh] relative">
                <iframe id="pdf-viewer-iframe" src="" class="w-full h-full border-0" type="application/pdf">
                    <div class="absolute inset-0 flex flex-col justify-center items-center p-6 text-center">
                        <p class="text-gray-600 mb-4 font-medium">您的瀏覽器或裝置不支援直接線上預覽 PDF 檔案。</p>
                        <a id="fallback-pdf-link" href="#" target="_blank" class="px-6 py-3 bg-brand-800 text-white font-bold rounded-lg shadow-md hover:bg-brand-900 transition-all">
                            點此直接打開 PDF 檔案
                        </a>
                    </div>
                </iframe>
            </div>

        </main>

        <!-- 頁尾宣告 -->
        <footer class="bg-gray-900 text-gray-400 py-6 border-t border-gray-800">
            <div class="max-w-6xl mx-auto px-4 text-center text-xs space-y-2">
                <p>馬博士筋骨整復 × 湧健康 高雄合作專案小組 製作公佈</p>
                <p>本文件內容僅供內部決策對焦與學術交流參考。對外宣傳素材必須另送正式合規程序審查。</p>
                <p class="text-gray-600">已啟用防搜尋機制 (No-Index) | 2026 高雄交流會談 | 網頁版本 v1.4</p>
            </div>
        </footer>

    </div>

    <!-- 3. 右下角 Go Top 回到頂部按鈕 -->
    <button id="go-top-btn" onclick="scrollToTop()" class="fixed bottom-6 right-6 z-40 bg-brand-800 hover:bg-brand-900 text-white p-3.5 rounded-full shadow-2xl transition-all duration-300 opacity-0 pointer-events-none transform translate-y-4 hover:scale-110 focus:outline-none" title="回到頂部">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
        </svg>
    </button>

    <!-- 4. 自訂 Toast 通知 (避免瀏覽器 Alert 造成頁面卡頓) -->
    <div id="toast" class="fixed bottom-6 left-6 z-50 bg-gray-900 text-white text-sm font-medium px-4 py-2.5 rounded-xl shadow-lg transition-all duration-300 translate-y-20 opacity-0 flex items-center gap-2">
        <span id="toast-text"></span>
    </div>

    <!-- 5. 互動控制與密碼保護邏輯 -->
    <script>
        const SECRET_PIN = "0720";
        let isPageUnlocked = false;

        // 安全地使用本地/會話儲存，完全預防沙盒阻斷拋錯
        function safeSessionGet(key) {
            try {
                return sessionStorage.getItem(key);
            } catch (e) {
                return null; // 安全降級，不中斷 JS 運行
            }
        }

        function safeSessionSet(key, value) {
            try {
                sessionStorage.setItem(key, value);
            } catch (e) {
                // 安全降級，不中斷 JS
            }
        }

        // 偵測執行環境，若是預覽沙盒則自動對接您 GitHub 的實體網址，否則使用同目錄相對路徑
        function getPdfUrl(filename) {
            const hostname = window.location.hostname;
            // 如果在 GitHub Pages 或是本地執行，使用相對路徑
            if (hostname.includes('github.io') || hostname === '127.0.0.1' || hostname === 'localhost' || !hostname) {
                return filename;
            } else {
                // 如果是在平台內嵌的沙盒預覽，則強制向您的 GitHub 取得真實檔案！
                return 'https://sbchen0804.github.io/DRMA/' + filename;
            }
        }

        // 登入密碼驗證
        function verifyPassword() {
            const inputVal = document.getElementById("pin-input").value;
            const errorElement = document.getElementById("error-message");
            const overlay = document.getElementById("password-overlay");
            const mainContent = document.getElementById("main-content");

            if (inputVal === SECRET_PIN) {
                // 成功解鎖
                isPageUnlocked = true;
                errorElement.classList.add("hidden");
                overlay.classList.add("translate-y-full", "opacity-0");
                
                setTimeout(() => {
                    overlay.classList.add("hidden");
                    mainContent.classList.remove("hidden");
                    
                    // 預設加載第一個 PDF
                    switchTab(1);
                    showToast("🔓 密碼正確，已為您載入 PDF 文件櫃");
                }, 400);

                safeSessionSet("isUnlocked", "true");
            } else {
                // 密碼錯誤
                errorElement.classList.remove("hidden");
                const inputContainer = document.getElementById("pin-input");
                inputContainer.classList.add("border-red-500", "animate-bounce");
                setTimeout(() => {
                    inputContainer.classList.remove("border-red-500", "animate-bounce");
                }, 600);
            }
        }

        // 自動檢測 SessionStorage 狀態
        window.addEventListener("DOMContentLoaded", () => {
            if (safeSessionGet("isUnlocked") === "true") {
                isPageUnlocked = true;
                document.getElementById("password-overlay").classList.add("hidden");
                document.getElementById("main-content").classList.remove("hidden");
                switchTab(1);
            }
            // 自動 focus 輸入框
            document.getElementById("pin-input").focus();
        });

        // 安全上鎖
        function lockPage() {
            isPageUnlocked = false;
            try {
                sessionStorage.removeItem("isUnlocked");
            } catch(e) {}
            document.getElementById("pin-input").value = "";
            document.getElementById("password-overlay").classList.remove("hidden", "translate-y-full", "opacity-0");
            document.getElementById("main-content").classList.add("hidden");
            showToast("🔒 網頁已安全上鎖");
        }

        // 核心更新：100% 不會拋錯且超安定之「單一 iframe 網址替換」切換邏輯
        function switchTab(tabNum) {
            if (!isPageUnlocked) return;

            let pdfFilename = "";
            
            // 對應您上傳至 GitHub 的三個檔案
            if (tabNum === 1) {
                pdfFilename = "03_DRMA_meeting_info.pdf";
            } else if (tabNum === 2) {
                pdfFilename = "01_DRMA_project.pdf";
            } else if (tabNum === 3) {
                pdfFilename = "02_DRTSAI_health_perspective.pdf";
            }

            const finalPdfUrl = getPdfUrl(pdfFilename);

            // 直接修改單一 iframe 的 src 載入新檔案
            const iframe = document.getElementById("pdf-viewer-iframe");
            const fallbackLink = document.getElementById("fallback-pdf-link");
            
            if (iframe) {
                iframe.src = finalPdfUrl;
            }
            if (fallbackLink) {
                fallbackLink.href = finalPdfUrl;
            }

            // 更新選單按鈕的 active 視覺樣式
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btn-tab-${i}`);
                if (!btn) continue;

                if (i === tabNum) {
                    // 選中狀態：白底深綠字、帶綠色小圓圈
                    btn.className = "px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 bg-white text-brand-900 shadow-sm flex items-center gap-2";
                    // 如果沒有圓點則補上
                    if (!btn.querySelector('span')) {
                        const dot = document.createElement('span');
                        dot.className = "w-2 h-2 rounded-full bg-emerald-600";
                        btn.prepend(dot);
                    }
                } else {
                    // 未選中狀態：半透明白
                    btn.className = "px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 text-emerald-100 hover:text-white hover:bg-brand-900/40 flex items-center gap-2";
                    // 移除圓點
                    const dot = btn.querySelector('span');
                    if (dot) {
                        dot.remove();
                    }
                }
            }

            showToast(`📄 已切換至第 ${tabNum} 份文件`);
            
            // 切換時自動平滑滾動回頁頂
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 監聽網頁滾動，控制 Go Top 按鈕的出現與消失
        window.onscroll = function() {
            const goTopBtn = document.getElementById("go-top-btn");
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
                goTopBtn.classList.remove("opacity-0", "pointer-events-none", "translate-y-4");
                goTopBtn.classList.add("opacity-100", "translate-y-0");
            } else {
                goTopBtn.classList.add("opacity-0", "pointer-events-none", "translate-y-4");
                goTopBtn.classList.remove("opacity-100", "translate-y-0");
            }
        };

        // 平滑回到頂部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 訊息吐司通知
        function showToast(text) {
            const toast = document.getElementById("toast");
            const toastText = document.getElementById("toast-text");
            
            toastText.textContent = text;
            toast.classList.remove("translate-y-20", "opacity-0");
            toast.classList.add("translate-y-0", "opacity-100");
            
            setTimeout(() => {
                toast.classList.remove("translate-y-0", "opacity-100");
                toast.classList.add("translate-y-20", "opacity-0");
            }, 2500);
        }
    </script>
</body>
</html>
